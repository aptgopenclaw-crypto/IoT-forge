spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mydb?currentSchema=taipei_streetlight_test
    username: postgres
    password: Kali1234!
    hikari:
      schema: taipei_streetlight_test
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: taipei_streetlight_test

  flyway:
    enabled: true
    schemas:
      - taipei_streetlight_test
    default-schema: taipei_streetlight_test
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      password: Kali1234!

  # 提供 mail host 讓 MailSenderAutoConfiguration 建立 JavaMailSender bean，
  # 滿足 PasswordResetMailService 的硬依賴（測試不會實際連線/寄信）。
  mail:
    host: localhost
    port: 25

tenant:
  mode: single
  default-id: DEFAULT

jwt:
  secret: test-only-secret-do-not-use-in-production-at-least-256-bits-long-here
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000
  temporary-token-expiration: 300000

cors:
  allowed-origins: http://localhost:3000

captcha:
  ttl: 300
  length: 4
  skip-verification: true  # 生產環境必須為 false；test profile 覆蓋為 true 以跳過驗證碼驗證

auth:
  cookie:
    secure: false
    same-site: Lax
    domain: ""
    path: /
    max-age: 604800

app:
  security:
    lock:
      max-fail-count: 5
      lock-duration-minutes: 10

user:
  password:
    min-length: 8
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    max-age-days: 90
    history-count: 5

feature:
  setting:
    enabled: true
  audit:
    enabled: true
  tenant:
    enabled: true
  dept:
    enabled: true
  rbac:
    enabled: true
  user:
    enabled: true
  auth:
    enabled: true 
  notification:
    enabled: true
  workflow:
    enabled: true
  schema:
    enabled: true
  device:
    enabled: true
  announcement:
    enabled: true
  dispatch:
    enabled: tru
  assettransfer:
    enabled: true
  platform:
    enabled: true
  eventrule:
    enabled: true